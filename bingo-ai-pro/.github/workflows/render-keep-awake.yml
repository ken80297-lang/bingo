name: Render Keep Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-render-health:
    runs-on: ubuntu-latest
    steps:
      - name: Call Render health endpoint
        run: |
          status="$(
            curl \
              --fail \
              --show-error \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 30 \
              --retry 2 \
              --retry-delay 5 \
              --user-agent "bingo-ai-pro-github-actions-keep-awake" \
              https://bingo-ai-pro.onrender.com/api/health
          )"
          echo "HTTP status: ${status}"
          test "${status}" = "200"
