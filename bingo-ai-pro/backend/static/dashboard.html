<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bingo AI 智慧分析儀表板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #151b23;
      --panel-2: #10161d;
      --text: #eef4fb;
      --muted: #9aa8b7;
      --line: #26313d;
      --ok: #31d07f;
      --warning: #f4c84a;
      --error: #ff6470;
      --unknown: #8994a3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #223142;
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #2b3b4e; }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }

    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }

    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .metric:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .label { color: var(--muted); }

    .value {
      text-align: right;
      overflow-wrap: anywhere;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 9px;
      border-radius: 999px;
      background: var(--unknown);
      color: #071018;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.ok, .badge.running, .badge.available { background: var(--ok); }
    .badge.warning { background: var(--warning); }
    .badge.error { background: var(--error); }
    .badge.unknown { background: var(--unknown); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      border-top: 0;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ball {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #223142;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .ball.super {
      background: #f4c84a;
      color: #071018;
      box-shadow: 0 0 0 2px rgba(244, 200, 74, 0.18);
    }

    .draw-numbers {
      margin-top: 8px;
    }

    .empty, .error-box {
      color: var(--muted);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .error-box {
      color: var(--error);
      margin-bottom: 14px;
      display: none;
    }

    @media (max-width: 860px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta { text-align: left; }

      .span-4, .span-6, .span-8, .span-12 {
        grid-column: span 12;
      }

      .toolbar { justify-content: flex-start; }
      table { font-size: 13px; }
      th, td { padding: 9px 6px; }
      .metric { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Bingo AI 智慧分析儀表板</h1>
      </div>
      <div class="meta">
        <div id="refreshState">載入中</div>
        <div>每 30 秒自動刷新</div>
      </div>
    </header>

    <div class="toolbar">
      <button type="button" id="refreshButton">重新整理</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <section class="grid">
      <article class="card span-6">
        <h2>系統狀態</h2>
        <div id="systemStatus"></div>
      </article>

      <article class="card span-6">
        <h2>&#26368;&#26032;&#38283;&#29518;&#36039;&#35338;</h2>
        <div id="latestDrawInfo"></div>
      </article>

      <article class="card span-6">
        <h2>資料品質</h2>
        <div id="dataQuality"></div>
      </article>

      <article class="card span-4">
        <h2>自適應權重</h2>
        <div id="adaptiveWeight"></div>
      </article>

      <article class="card span-4">
        <h2>老玩家特徵</h2>
        <div id="laowanjiaFeatures"></div>
      </article>

      <article class="card span-8">
        <h2>策略排行榜</h2>
        <div id="strategyRanking"></div>
      </article>

      <article class="card span-12">
        <h2>AI 今日推薦</h2>
        <div id="recommendationCenter"></div>
      </article>

      <article class="card span-12">
        <h2>&#21205;&#24907;&#36229;&#29518;&#25512;&#34214;</h2>
        <div id="superRecommendation"></div>
      </article>

      <article class="card span-12">
        <h2>最新模擬</h2>
        <div id="latestSimulation"></div>
      </article>
    </section>
  </main>

  <script>
    const apis = {
      dashboard: "/api/dashboard",
      system: "/api/system/status",
      strategy: "/api/strategy-ranking/latest",
      simulation: "/api/simulation/latest",
      adaptive: "/api/adaptive-weight/latest",
      quality: "/api/data-quality/latest",
      recommendation: "/api/recommendation-center/latest",
      laowanjiaFeatures: "/api/laowanjia-features/latest",
      kuaishouLatest: "/api/kuaishou/latest"
    };

    const statusText = {
      ok: "正常",
      running: "執行中",
      available: "可用",
      warning: "警告",
      error: "錯誤",
      unknown: "未知",
      stopped: "停止"
    };

    const reasonText = {
      "hot + recent trend": "熱門 + 近期趨勢",
      "cold rebound": "冷門反彈",
      "balanced candidate": "平衡候選",
      "strategy balance": "策略平衡"
    };

    const text = (value, fallback = "-") => {
      if (value === null || value === undefined || value === "") return fallback;
      return String(value);
    };

    const number = (value) => {
      if (value === null || value === undefined || value === "") return "-";
      const n = Number(value);
      return Number.isFinite(n) ? n.toFixed(4).replace(/\.?0+$/, "") : text(value);
    };

    const translateStatus = (status) => {
      const value = text(status, "unknown").toLowerCase();
      return statusText[value] || text(status, "未知");
    };

    const statusBadge = (status) => {
      const value = text(status, "unknown").toLowerCase();
      const type = ["ok", "running", "available", "warning", "error", "unknown"].includes(value) ? value : "unknown";
      return `<span class="badge ${type}">${translateStatus(value)}</span>`;
    };

    const metric = (label, value) => `
      <div class="metric">
        <span class="label">${label}</span>
        <span class="value">${value}</span>
      </div>
    `;

    async function loadJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error(`${url} HTTP ${response.status}`);
      return response.json();
    }

    async function loadAll() {
      document.getElementById("refreshState").textContent = "載入中";
      const entries = await Promise.allSettled(
        Object.entries(apis).map(async ([key, url]) => [key, await loadJson(url)])
      );
      const data = {};
      const errors = [];
      for (const entry of entries) {
        if (entry.status === "fulfilled") {
          data[entry.value[0]] = entry.value[1];
        } else {
          errors.push(entry.reason.message);
        }
      }
      render(data, errors);
    }

    function render(data, errors) {
      const dashboard = data.dashboard || {};
      const system = data.system || dashboard.system || {};
      const collector = system.collector || dashboard.collector || {};
      const quality = (data.quality && data.quality.data) || dashboard.data_quality || {};
      const adaptive = (data.adaptive && data.adaptive.data) || dashboard.adaptive_weight || {};
      const strategies = (data.strategy && data.strategy.data) || dashboard.strategy_ranking || [];
      const simulation = (data.simulation && data.simulation.data) || dashboard.latest_simulation || {};
      const recommendation = (data.recommendation && data.recommendation.data) || {};
      const laowanjiaFeatures = (data.laowanjiaFeatures && data.laowanjiaFeatures.data) || {};
      const latestDraw = (data.kuaishouLatest && data.kuaishouLatest.data) || data.kuaishouLatest || {};

      document.getElementById("errorBox").style.display = errors.length ? "block" : "none";
      document.getElementById("errorBox").textContent = errors.length ? `API 錯誤：${errors.join("；")}` : "";
      document.getElementById("refreshState").textContent = `最後刷新：${new Date().toLocaleString()}`;

      renderSystem(system, collector);
      renderLatestDrawInfo(latestDraw);
      renderQuality(quality);
      renderAdaptive(adaptive);
      renderLaowanjiaFeatures(laowanjiaFeatures);
      renderStrategies(strategies);
      renderRecommendation(recommendation);
      renderSuperRecommendation(recommendation ? recommendation.super_recommendation : null);
      renderSimulation(simulation);
    }

    function renderSystem(system, collector) {
      const kuaishou = collector.kuaishou || {};
      const cloud = system.database ? system.database.cloud : undefined;
      document.getElementById("systemStatus").innerHTML = [
        metric("排程狀態", statusBadge(system.scheduler)),
        metric("雲端資料庫", statusBadge(cloud || "unknown")),
        metric("收集器", statusBadge(kuaishou.status)),
        metric("最新期數", text(system.latest_issue)),
        metric("最後更新", text(system.last_update))
      ].join("");
    }

    function latestParsedRow(snapshot) {
      const parsed = snapshot && snapshot.parsed_json ? snapshot.parsed_json : {};
      const apiData = parsed.api_get_data || {};
      const rows = Array.isArray(apiData.data) ? apiData.data : [];
      return rows[0] || {};
    }

    function normalizeDrawNumbers(value) {
      if (Array.isArray(value)) return value;
      if (value && typeof value === "object") {
        return normalizeDrawNumbers(
          value.numbers ||
          value.draw_numbers ||
          value.result ||
          value["\u4e00\u822c\u734e\u865f"]
        );
      }
      if (typeof value === "string") {
        return value.split(/[,\s]+/).filter(Boolean);
      }
      return [];
    }

    function cleanDrawNumbers(value) {
      const seen = new Set();
      return normalizeDrawNumbers(value)
        .map((n) => Number(n))
        .filter((n) => Number.isFinite(n) && n >= 1 && n <= 80)
        .filter((n) => {
          if (seen.has(n)) return false;
          seen.add(n);
          return true;
        })
        .slice(0, 20);
    }

    function parseNumbersFromRawHtml(rawHtml) {
      if (!rawHtml) return [];
      const html = String(rawHtml);
      const labeledMatch = html.match(/(?:\u4e00\u822c\u734e\u865f|\u4e00\u822c\u5956\u53f7|draw_numbers|numbers)[\s\S]{0,900}/i);
      const source = labeledMatch ? labeledMatch[0] : html;
      const matches = [...source.matchAll(/(?:^|[^\d])([1-9]|[1-7]\d|80)(?!\d)/g)].map((match) => match[1]);
      return cleanDrawNumbers(matches);
    }

    function findNestedDrawNumbers(value, depth = 0) {
      if (!value || depth > 5) return [];
      const direct = cleanDrawNumbers(value);
      if (direct.length >= 20) return direct;

      if (Array.isArray(value)) {
        for (const item of value) {
          const nested = findNestedDrawNumbers(item, depth + 1);
          if (nested.length >= 20) return nested;
        }
        return direct;
      }

      if (typeof value === "object") {
        const priorityKeys = [
          "numbers",
          "draw_numbers",
          "result",
          "\u4e00\u822c\u734e\u865f",
          "\u4e00\u822c\u5956\u53f7"
        ];
        for (const key of priorityKeys) {
          if (Object.prototype.hasOwnProperty.call(value, key)) {
            const nested = findNestedDrawNumbers(value[key], depth + 1);
            if (nested.length >= 20) return nested;
          }
        }
        for (const key of Object.keys(value)) {
          const nested = findNestedDrawNumbers(value[key], depth + 1);
          if (nested.length >= 20) return nested;
        }
      }

      return [];
    }

    function findNestedSuperNumber(value, depth = 0) {
      if (!value || depth > 5 || typeof value !== "object") return "";
      const keys = [
        "super_number",
        "super",
        "\u8d85\u7d1a\u734e\u865f",
        "\u8d85\u7d1a\u5956\u53f7"
      ];
      for (const key of keys) {
        if (Object.prototype.hasOwnProperty.call(value, key)) {
          const n = Number(value[key]);
          if (Number.isFinite(n) && n >= 1 && n <= 80) return n;
        }
      }

      const children = Array.isArray(value) ? value : Object.values(value);
      for (const child of children) {
        const nested = findNestedSuperNumber(child, depth + 1);
        if (nested) return nested;
      }
      return "";
    }

    function parseSuperNumberFromRawHtml(rawHtml) {
      if (!rawHtml) return "";
      const html = String(rawHtml);
      const labeledMatch = html.match(/(?:\u8d85\u7d1a\u734e\u865f|\u8d85\u7d1a\u5956\u53f7|super_number|super)[\s\S]{0,160}?(?:^|[^\d])([1-9]|[1-7]\d|80)(?!\d)/i);
      if (!labeledMatch) return "";
      const n = Number(labeledMatch[1]);
      return Number.isFinite(n) && n >= 1 && n <= 80 ? n : "";
    }

    function getLatestDrawNumbers(snapshot) {
      const row = latestParsedRow(snapshot);
      const candidates = [
        snapshot ? snapshot.numbers : null,
        snapshot ? snapshot.draw_numbers : null,
        snapshot ? snapshot.result : null,
        row["\u4e00\u822c\u734e\u865f"],
        row.numbers,
        row.draw_numbers
      ];

      let partial = [];
      for (const candidate of candidates) {
        const numbers = cleanDrawNumbers(candidate);
        if (numbers.length >= 20) return numbers;
        if (!partial.length && numbers.length) partial = numbers;
      }

      const nestedNumbers = findNestedDrawNumbers(snapshot ? snapshot.parsed_json : null);
      if (nestedNumbers.length >= 20) return nestedNumbers;

      const rawNumbers = parseNumbersFromRawHtml(snapshot ? snapshot.raw_html : "");
      if (rawNumbers.length >= 20) return rawNumbers;
      return partial.length ? partial : rawNumbers;
    }

    function getLatestSuperNumber(snapshot) {
      const row = latestParsedRow(snapshot);
      return (snapshot && (snapshot.super_number || snapshot.super)) ||
        row["\u8d85\u7d1a\u734e\u865f"] ||
        row["\u8d85\u7d1a\u5956\u53f7"] ||
        row.super_number ||
        row.super ||
        findNestedSuperNumber(snapshot ? snapshot.parsed_json : null) ||
        parseSuperNumberFromRawHtml(snapshot ? snapshot.raw_html : "");
    }

    function getLatestDrawTime(snapshot) {
      const row = latestParsedRow(snapshot);
      return snapshot && snapshot.draw_time
        ? snapshot.draw_time
        : row["\u958b\u734e\u6642\u9593"];
    }

    function getLatestIssue(snapshot) {
      const row = latestParsedRow(snapshot);
      return snapshot && snapshot.issue ? snapshot.issue : row["\u671f\u6578"];
    }

    function renderLatestDrawInfo(snapshot) {
      const target = document.getElementById("latestDrawInfo");
      const issue = getLatestIssue(snapshot);
      const drawTime = getLatestDrawTime(snapshot);
      const numbers = getLatestDrawNumbers(snapshot);
      const superNumber = getLatestSuperNumber(snapshot);

      if (!issue && !drawTime && !numbers.length && !superNumber) {
        target.innerHTML = `<div class="empty">&#23578;&#28961;&#36039;&#26009;</div>`;
        return;
      }

      const balls = numbers
        .map((n) => `<span class="ball">${String(n).padStart(2, "0")}</span>`)
        .join("");
      const superBall = superNumber
        ? `<span class="ball super">${String(superNumber).padStart(2, "0")}</span>`
        : "&#23578;&#28961;&#36039;&#26009;";

      target.innerHTML = [
        metric("&#26399;&#25976;", text(issue)),
        metric("&#38283;&#29518;&#26178;&#38291;", text(drawTime)),
        `<div class="metric">
          <span class="label">&#19968;&#33324;&#29518;&#34399;</span>
          <span class="value">
            <span class="numbers draw-numbers">${balls || "&#23578;&#28961;&#36039;&#26009;"}</span>
          </span>
        </div>`,
        metric("&#36229;&#32026;&#29518;&#34399;", superBall)
      ].join("");
    }

    function renderQuality(quality) {
      document.getElementById("dataQuality").innerHTML = [
        metric("資料品質狀態", statusBadge(quality.status)),
        metric("漏期數", number(quality.missing_count)),
        metric("異常資料數", number(quality.invalid_count))
      ].join("");
    }

    function renderAdaptive(adaptive) {
      if (!adaptive) {
        document.getElementById("adaptiveWeight").innerHTML = `<div class="empty">尚無資料</div>`;
        return;
      }
      document.getElementById("adaptiveWeight").innerHTML = [
        metric("老玩家權重", number(adaptive.laowanjia_weight)),
        metric("熱門冷門權重", number(adaptive.hot_cold_weight)),
        metric("平衡權重", number(adaptive.balance_weight)),
        metric("尾數權重", number(adaptive.tail_weight)),
        metric("隨機權重", number(adaptive.random_weight)),
        metric("命中率", number(adaptive.hit_rate))
      ].join("");
    }

    function renderLaowanjiaFeatures(feature) {
      if (!feature) {
        document.getElementById("laowanjiaFeatures").innerHTML = `<div class="empty">尚無資料</div>`;
        return;
      }
      document.getElementById("laowanjiaFeatures").innerHTML = [
        metric("總分", number(feature.total_laowanjia_feature_score)),
        metric("連號分數", number(feature.consecutive_score)),
        metric("雙生號分數", number(feature.twin_score)),
        metric("斜線分數", number(feature.diagonal_score)),
        metric("差值分數", number(feature.gap_score)),
        metric("補號分數", number(feature.missing_score)),
        metric("大小平衡", number(feature.big_small_score)),
        metric("單雙平衡", number(feature.odd_even_score))
      ].join("");
    }

    function renderStrategies(strategies) {
      if (!strategies || !strategies.length) {
        document.getElementById("strategyRanking").innerHTML = `<div class="empty">尚無資料</div>`;
        return;
      }
      const rows = strategies.map((item, index) => `
        <tr>
          <td>${index + 1}</td>
          <td>${text(item.strategy)}</td>
          <td>${number(item.average_hits)}</td>
          <td>${number(item.hit_rate)}</td>
          <td>${number(item.rank_score)}</td>
        </tr>
      `).join("");
      document.getElementById("strategyRanking").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>排名</th>
              <th>策略</th>
              <th>平均命中</th>
              <th>命中率</th>
              <th>排名分數</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function chineseExplanation(item, recommendation) {
      return `目前最佳策略為 ${text(item.strategy || recommendation.best_strategy)}，資料品質狀態為 ${translateStatus(recommendation.data_quality_status)}，本組推薦信心為 ${number(item.confidence)}%。`;
    }

    function renderRecommendation(recommendation) {
      if (!recommendation || !recommendation.results || !recommendation.results.length) {
        document.getElementById("recommendationCenter").innerHTML = `<div class="empty">尚無資料，請先執行 POST /api/recommendation-center/generate。</div>`;
        return;
      }
      const summary = [
        metric("信心值", `${number(recommendation.confidence)}%`),
        metric("最佳策略", text(recommendation.best_strategy)),
        metric("目標期數", text(recommendation.target_issue)),
        metric("資料品質狀態", statusBadge(recommendation.data_quality_status))
      ].join("");
      const rows = recommendation.results.slice(0, 5).map((item, index) => {
        const balls = (item.numbers || []).map(n => `<span class="ball">${text(n)}</span>`).join("");
        return `
          <tr>
            <td>${index + 1}</td>
            <td><div class="numbers">${balls}</div></td>
            <td>${number(item.total_score)}</td>
            <td>${number(item.confidence)}%</td>
            <td>${chineseExplanation(item, recommendation)}</td>
          </tr>
        `;
      }).join("");
      document.getElementById("recommendationCenter").innerHTML = `
        <div>${summary}</div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>推薦號碼</th>
              <th>總分</th>
              <th>信心值</th>
              <th>說明</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderSuperRecommendation(superRecommendation) {
      if (!superRecommendation || !superRecommendation.recommended || !superRecommendation.recommended.length) {
        document.getElementById("superRecommendation").innerHTML = `<div class="empty">尚無資料</div>`;
        return;
      }
      const rows = superRecommendation.recommended.slice(0, 3).map((item, index) => `
        <tr>
          <td>${index + 1}</td>
          <td><span class="ball">${text(item.number)}</span></td>
          <td>${number(item.confidence)}%</td>
          <td>${reasonText[item.reason] || text(item.reason)}</td>
        </tr>
      `).join("");
      const hot = (superRecommendation.hot || []).map(n => `<span class="ball">${text(n)}</span>`).join("");
      const cold = (superRecommendation.cold || []).map(n => `<span class="ball">${text(n)}</span>`).join("");
      const basedOnIssue = superRecommendation.based_on_issue || superRecommendation.source_issue;
      document.getElementById("superRecommendation").innerHTML = `
        <div class="metric">
          <span class="label">依據期數</span>
          <span class="value">${text(basedOnIssue)}</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>超級獎號</th>
              <th>信心值</th>
              <th>原因</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="metric">
          <span class="label">熱門超級獎號</span>
          <span class="value"><span class="numbers">${hot || "-"}</span></span>
        </div>
        <div class="metric">
          <span class="label">冷門超級獎號</span>
          <span class="value"><span class="numbers">${cold || "-"}</span></span>
        </div>
      `;
    }

    function renderSimulation(simulation) {
      const results = (simulation && simulation.results) || [];
      if (!results.length) {
        document.getElementById("latestSimulation").innerHTML = `<div class="empty">尚無資料</div>`;
        return;
      }
      const rows = results.slice(0, 5).map((item, index) => {
        const source = item.scores && item.scores.weights ? item.scores.weights.source : "default";
        const balls = (item.numbers || []).map(n => `<span class="ball">${text(n)}</span>`).join("");
        return `
          <tr>
            <td>${index + 1}</td>
            <td><div class="numbers">${balls}</div></td>
            <td>${number(item.total_score)}</td>
            <td>${text(source)}</td>
          </tr>
        `;
      }).join("");
      const summary = [
        metric("最新模擬期數", text(simulation.source_issue)),
        metric("產生時間", text(simulation.generated_at || simulation.created_at)),
        metric("模型版本", text(simulation.model_version)),
        metric("樣本數", number(simulation.sample_size))
      ].join("");
      document.getElementById("latestSimulation").innerHTML = `
        <div>${summary}</div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>推薦號碼</th>
              <th>總分</th>
              <th>來源</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    document.getElementById("refreshButton").addEventListener("click", loadAll);
    loadAll();
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
