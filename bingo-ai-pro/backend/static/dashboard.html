<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bingo AI 智慧預測中心</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111c;
      --panel: #101c28;
      --panel-soft: #162638;
      --text: #f4f8ff;
      --muted: #9fb1c8;
      --line: #284058;
      --ok: #2fd17c;
      --warn: #f6c344;
      --bad: #ff6478;
      --accent: #59c7ff;
      --super: #ffd166;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 0%, rgba(89, 199, 255, .18), transparent 32%),
        radial-gradient(circle at 85% 4%, rgba(47, 209, 124, .10), transparent 30%),
        linear-gradient(180deg, #07111c 0%, #0b1724 100%);
      color: var(--text);
      font-family: Arial, "Microsoft JhengHei", "PingFang TC", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(780px, 100%);
      margin: 0 auto;
      padding: 18px 12px 42px;
    }

    header {
      padding: 10px 4px 18px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    h3 {
      margin: 16px 0 8px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #1c344a;
      color: var(--text);
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 800;
    }

    .card {
      width: 100%;
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(16, 28, 40, .96);
      box-shadow: 0 16px 36px rgba(0, 0, 0, .24);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .metric .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .metric .value {
      font-size: 20px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .balls, .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: #243d55;
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .ball.super {
      background: var(--super);
      color: #111827;
      box-shadow: 0 0 0 3px rgba(255, 209, 102, .18);
    }

    .ball.hit {
      background: #f6c344;
      color: #111827;
      border-color: rgba(255, 255, 255, .28);
      box-shadow: 0 0 0 3px rgba(246, 195, 68, .18);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #1d3144;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
    }

    .list {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .row span:last-child {
      text-align: right;
      font-weight: 800;
    }

    .empty, .notice {
      padding: 13px;
      border-radius: 10px;
      background: #162433;
      color: var(--muted);
    }

    .notice.warn { color: var(--warn); }
    .notice.bad { color: var(--bad); }
    .notice.ok { color: var(--ok); }

    .status-ok { color: var(--ok); }
    .status-warning { color: var(--warn); }
    .status-error { color: var(--bad); }
    .status-unknown { color: var(--muted); }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: #263849;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--ok), var(--warn), var(--bad));
    }

    .collapse-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      text-align: left;
      cursor: pointer;
    }

    .summary-line {
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .mini-title {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
    }

    .rule-list {
      display: grid;
      gap: 10px;
    }

    .rule-item {
      padding: 12px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .rule-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .muted {
      color: var(--muted);
    }

    details {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: rgba(16, 28, 40, .72);
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 800;
    }

    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: var(--muted);
      font-size: 12px;
    }

    @media (min-width: 720px) {
      main { padding-top: 28px; }
      h1 { font-size: 34px; }
      .card { padding: 22px; }
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      main { padding-left: 10px; padding-right: 10px; padding-bottom: 72px; }
      h1 { font-size: 26px; }
      .card { padding: 14px; border-radius: 10px; }
      .grid { grid-template-columns: 1fr; }
      .ball {
        min-width: 40px;
        height: 36px;
        padding: 0 10px;
        font-size: 16px;
      }
      .metric .value { font-size: 18px; }
      .row { align-items: flex-start; }
      .row span:last-child { max-width: 58%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Bingo AI 智慧預測中心</h1>
      <div class="subtitle">打開首頁 5 秒內看懂下一期推薦、老玩家模式、資料同步與 AI 成績。</div>
      <div class="toolbar">
        <button type="button" id="refreshButton">重新整理</button>
        <span id="refreshState">載入中</span>
      </div>
    </header>

    <div id="errorBox" class="notice warn" style="display:none"></div>

    <section>
      <article class="card" id="cardNext"></article>
      <article class="card" id="cardLaowanjia"></article>
      <article class="card" id="cardReasons"></article>
      <article class="card" id="cardAlerts"></article>
      <article class="card" id="cardHistory"></article>
      <article class="card" id="cardSync"></article>
      <article class="card" id="cardWake"></article>
      <article class="card" id="cardContinuity"></article>
      <article class="card" id="cardPipeline"></article>
      <article class="card" id="cardOfficial"></article>
      <article class="card" id="cardOperations"></article>
      <article class="card" id="cardEvolution"></article>
    </section>

    <details>
      <summary>進階資訊 / Developer</summary>
      <pre id="developerInfo">載入中</pre>
    </details>
  </main>

  <script>
    const API_TIMEOUT_MS = 10000;
    const HEALTH_STORAGE_KEY = "bingo-ai-health-cache";
    const HEALTH_STORAGE_MAX_AGE_MS = 30 * 60 * 1000;

    const apis = {
      playerSummary: "/api/dashboard/player-summary",
      next: "/api/next-prediction",
      system: "/api/system/status",
      official: "/api/official/statistics",
      health: "/api/pipeline/health",
      operations: "/api/operations/summary",
      evolution: "/api/strategy-evolution/latest",
      evolutionHistory: "/api/strategy-evolution/history",
      collectorStatus: "/api/collector/status",
      collectorGaps: "/api/collector/gaps",
      latestSync: "/api/collector/latest-sync",
      wakeStatus: "/api/health/wake-status",
      analysisLatest: "/api/analysis/latest"
    };

    const zhStatus = {
      ok: "正常",
      warning: "警告",
      error: "錯誤",
      unknown: "未知",
      running: "執行中",
      available: "可用",
      ready: "已準備",
      waiting_draw: "等待開獎",
      verified: "已驗證",
      learned: "已學習",
      expired: "已過期",
      failed: "失敗",
      skipped_due_to_lock: "前一輪仍在執行",
      complete: "完整",
      incomplete: "不完整"
    };

    Object.assign(zhStatus, {
      ready: "等待開獎",
      waiting_draw: "等待開獎",
      waiting_refresh: "等待同步",
      verified: "已驗證",
      learned: "已學習",
      expired: "已過期",
      unavailable: "尚無資料"
    });

    const safe = (value, fallback = "尚無資料") => {
      if (value === null || value === undefined || value === "" || Number.isNaN(value)) return fallback;
      return String(value);
    };

    const asList = (value) => Array.isArray(value) ? value : [];

    const fmtNumber = (value, fallback = "0") => {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return n.toFixed(2).replace(/\.?0+$/, "");
    };

    const percent = (value) => {
      const n = Number(value);
      if (!Number.isFinite(n)) return "0%";
      return `${fmtNumber(n > 1 ? n : n * 100)}%`;
    };

    const statusText = (status) => zhStatus[status] || safe(status);

    const statusClass = (status) => {
      if (["ok", "complete", "ready", "verified", "learned", "available", "running"].includes(status)) return "status-ok";
      if (["warning", "waiting_draw", "skipped_due_to_lock", "incomplete"].includes(status)) return "status-warning";
      if (["error", "expired", "failed"].includes(status)) return "status-error";
      return "status-unknown";
    };

    const zhMap = {
      stable: "穩定",
      high: "高",
      moderate: "普通",
      low: "較低",
      good: "良好",
      excellent: "極佳",
      strong: "優良",
      no_hit: "未命中",
      big: "偏大",
      small: "偏小",
      odd: "偏單",
      even: "偏雙",
      balanced: "均衡",
      Balance: "均衡模型",
      HotCold: "冷熱模型",
      Missing: "缺號模型",
      Pattern: "型態模型",
      laowanjia: "老玩家模型"
    };

    const labelZh = (value) => zhMap[value] || safe(value);
    const numberLabel = (value) => String(Number(value)).padStart(2, "0");
    const sourceText = (value) => ({
      official_collector: "官方 Collector",
      production_history: "正式歷史資料",
      production_read_layer: "正式讀取層",
      database: "正式資料庫"
    }[value] || safe(value, "正式資料"));
    const triggerText = (value) => ({
      official_draw_saved: "官方開獎儲存完成",
      production_read_layer: "正式讀取層",
      scheduler: "排程觸發"
    }[value] || safe(value, "正式讀取層"));

    const normalizeNumbers = (values) => {
      const source = Array.isArray(values) ? values : [];
      return [...new Set(source.map((value) => Number(value)).filter((number) => Number.isInteger(number) && number >= 1 && number <= 80))]
        .sort((a, b) => a - b);
    };

    const sortPairs = (pairs) => asList(pairs)
      .map((pair) => normalizeNumbers(pair).slice(0, 2))
      .filter((pair) => pair.length === 2)
      .sort((a, b) => a[0] - b[0] || a[1] - b[1]);

    const formatDateTime = (value) => {
      if (!value) return "尚無資料";
      const rawText = String(value).trim();
      const slashDate = rawText.match(/^(\d{4})\/(\d{2})\/(\d{2})\s+(.+)$/);
      const normalized = slashDate
        ? `${slashDate[1]}-${slashDate[2]}-${slashDate[3]}T${slashDate[4]}`
        : (rawText.includes(" ") ? rawText.replace(" ", "T") : rawText);
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return safe(value);
      const parts = new Intl.DateTimeFormat("zh-TW", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "numeric",
        minute: "2-digit",
        second: "2-digit",
        hour12: true
      }).formatToParts(date).reduce((acc, part) => {
        acc[part.type] = part.value;
        return acc;
      }, {});
      return `${parts.year}/${parts.month}/${parts.day} ${parts.dayPeriod || ""}${parts.hour}:${parts.minute}:${parts.second}`;
    };

    const staleStatusText = (status, lag) => {
      if (status === "normal" || Number(lag) === 0) return "正常";
      if (status === "waiting_sync" || Number(lag) === 1) return "等待同步";
      if (status === "possibly_expired") return "可能過期";
      return safe(status, "尚無資料");
    };

    const staleStatusClass = (status, lag) => {
      if (status === "normal" || Number(lag) === 0) return "status-ok";
      if (status === "waiting_sync" || Number(lag) === 1) return "status-warning";
      return "status-error";
    };

    const metric = (label, value, extraClass = "") => `
      <div class="metric">
        <div class="label">${label}</div>
        <div class="value ${extraClass}">${value}</div>
      </div>
    `;

    const balls = (values, type = "", hitValues = []) => {
      const hits = new Set(normalizeNumbers(hitValues));
      const items = normalizeNumbers(values);
      if (!items.length) return `<div class="empty">尚無資料</div>`;
      return `<div class="balls">${items.map((n) => `<span class="ball ${type} ${hits.has(Number(n)) ? "hit" : ""}">${numberLabel(n)}</span>`).join("")}</div>`;
    };

    const chips = (values) => {
      const items = asList(values).filter((item) => item !== null && item !== undefined && item !== "");
      if (!items.length) return `<div class="empty">尚無資料</div>`;
      return `<div class="chips">${items.map((item) => `<span class="chip">${Array.isArray(item) ? item.map(numberLabel).join("、") : safe(item)}</span>`).join("")}</div>`;
    };

    const textList = (values) => {
      const items = asList(values).filter((item) => item !== null && item !== undefined && item !== "");
      if (!items.length) return `<div class="empty">尚無資料</div>`;
      return `<div class="chips">${items.map((item) => `<span class="chip">${safe(item)}</span>`).join("")}</div>`;
    };

    const rows = (items) => `<div class="list">${items.join("")}</div>`;
    const row = (label, value, cls = "") => `<div class="row"><span>${label}</span><span class="${cls}">${value}</span></div>`;

    function saveHealthBrowserCache(payload) {
      try {
        localStorage.setItem(HEALTH_STORAGE_KEY, JSON.stringify({ saved_at: Date.now(), payload }));
      } catch (error) {
        console.warn("[dashboard] health browser cache save failed", error);
      }
    }

    function loadHealthBrowserCache() {
      try {
        const raw = localStorage.getItem(HEALTH_STORAGE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (!cached || !cached.payload) return null;
        if ((Date.now() - Number(cached.saved_at || 0)) > HEALTH_STORAGE_MAX_AGE_MS) return null;
        return {
          ...cached.payload,
          cached: true,
          source: "browser",
          stale: true,
          cache_state: cached.payload.cache_state || "stale",
          browser_cache_saved_at: new Date(cached.saved_at).toISOString()
        };
      } catch (error) {
        console.warn("[dashboard] health browser cache load failed", error);
        return null;
      }
    }

    async function loadJson(key, url, timeoutMs = API_TIMEOUT_MS) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(url, { cache: "no-store", signal: controller.signal });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (key === "health") saveHealthBrowserCache(payload);
        return payload;
      } catch (error) {
        const message = error && error.name === "AbortError"
          ? `${url} timeout after ${timeoutMs / 1000}s`
          : `${url} ${error && error.message ? error.message : error}`;
        console.warn("[dashboard] API failed", { endpoint: url, error: message });
        if (key === "health") {
          const cachedHealth = loadHealthBrowserCache();
          if (cachedHealth) return cachedHealth;
        }
        return { status: "unknown", unavailable: true, error: message };
      } finally {
        clearTimeout(timer);
      }
    }

    async function loadAll() {
      document.getElementById("refreshState").textContent = "載入中";
      const loaded = await Promise.allSettled(
        Object.entries(apis).map(async ([key, url]) => [key, await loadJson(key, url)])
      );
      const data = {};
      const errors = [];
      for (const entry of loaded) {
        if (entry.status === "fulfilled") {
          data[entry.value[0]] = entry.value[1];
        } else {
          errors.push(entry.reason && entry.reason.message ? entry.reason.message : String(entry.reason));
        }
      }
      render(data, errors);
      document.getElementById("refreshState").textContent = `最後刷新：${new Date().toLocaleString()}`;
    }

    function normalizeNext(data) {
      const player = data.playerSummary && data.playerSummary.status === "ok" ? data.playerSummary : null;
      const raw = player && player.next_prediction ? player.next_prediction : (data.next && data.next.next_recommendation) || data.next || {};
      const release = (player && (player.active_release || player.release)) || (data.next && data.next.release) || {};
      const scope = (player && player.production_scope) || (data.next && data.next.production_scope) || {};
      const gitCommit = raw.git_commit_hash || release.git_commit_hash || "";
      return {
        prediction_issue: raw.prediction_issue || raw.target_issue,
        target_issue_source: raw.target_issue_source,
        based_on_issue: raw.based_on_issue || raw.source_issue,
        based_on_draw_time: raw.based_on_draw_time,
        based_on_time_source: raw.based_on_time_source,
        based_on_draw_exists: raw.based_on_draw_exists,
        latest_official_issue: raw.latest_official_issue,
        expected_target_issue: raw.expected_target_issue,
        status: raw.status || (raw.prediction_issue || raw.target_issue ? "ready" : "unknown"),
        stale_status: raw.stale_status,
        lag_issues: raw.lag_issues,
        expected_draw_time: raw.expected_draw_time,
        target_draw_time: raw.target_draw_time || raw.expected_draw_time,
        generated_at: raw.generated_at,
        confidence: raw.confidence,
        candidates: normalizeNumbers(raw.candidates || raw.main_numbers || raw.recommend_numbers || []),
        super_number: raw.super_number || raw.recommended_super_number,
        three_star: normalizeNumbers(raw.three_star || asList(raw.main_numbers).slice(0, 3)),
        four_star: normalizeNumbers(raw.four_star || asList(raw.main_numbers).slice(0, 4)),
        five_star: normalizeNumbers(raw.five_star || []),
        six_star: normalizeNumbers(raw.six_star || []),
        twins: normalizeNumbers(raw.twins || []),
        consecutive: sortPairs(raw.consecutive || []),
        patch_numbers: normalizeNumbers(raw.patch_numbers || []),
        tails: normalizeNumbers(raw.tails || []),
        tail_groups: asList(raw.tail_groups),
        big_small: raw.big_small,
        odd_even: raw.odd_even,
        model_scores: raw.model_scores || {},
        winning_model: raw.winning_model,
        source: raw.source,
        trigger: raw.trigger,
        release_version: raw.release_version || release.release_version,
        git_commit_hash: gitCommit,
        git_commit_short: raw.git_commit_short || release.git_commit_short || (gitCommit ? String(gitCommit).slice(0, 7) : ""),
        production_generation: raw.production_generation || scope.production_generation || release.production_generation,
        model_version: raw.model_version || release.model_version,
        feature_version: raw.feature_version || release.feature_version,
        production_valid: raw.production_valid !== false,
        is_stale: raw.is_stale,
        reasons: raw.reasons || [],
        recommendation_warning: raw.recommendation_warning,
        rule_library: raw.rule_library || (player && player.rule_library) || {}
      };
    }

    function render(data, errors) {
      const player = data.playerSummary && data.playerSummary.status === "ok" ? data.playerSummary : null;
      const next = normalizeNext(data);
      const laowanjia = player && player.next_prediction && player.next_prediction.laowanjia
        ? player.next_prediction.laowanjia
        : (data.next && data.next.laowanjia) || {};
      const history = player ? (player.history || {}) : (data.next && data.next.history) || {};
      const alerts = player && player.next_prediction ? (player.next_prediction.alerts || {}) : (data.next && data.next.alerts) || {};
      const previousVerification = player ? (player.previous_verification || {}) : {};
      window.__previousVerification = previousVerification || {};
      const currentDraw = player ? (player.current_draw || {}) : {};
      const counts = player ? (player.data_counts || {}) : {};
      const sync = player ? (player.sync || {}) : (data.system || {});

      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = errors.length ? "block" : "none";
      errorBox.textContent = errors.length ? "部分資料暫時無法取得，其他卡片已先顯示。" : "";

      renderNext(next);
      renderLaowanjia(next.rule_library || (player && player.rule_library) || {}, next);
      renderReasons(next.reasons, data.next || {}, previousVerification, next);
      renderAlerts(alerts, data.analysisLatest || {});

              ${predicted.length !== 20 ? `<div class="notice warn">此筆保存 ${fmtNumber(predicted.length)} 碼，分母使用實際保存數量。</div>` : ""}
              <h3>官方20碼</h3>${official.length ? balls(official, "", matched) : `<div class="empty">尚待開獎</div>`}
              <div class="grid section">
                ${metric("官方超級獎號", item.official_super_number ? numberLabel(item.official_super_number) : "尚無資料")}
                ${metric("超級獎命中", item.super_number_hit ? "命中" : "未命中", item.super_number_hit ? "status-ok" : "")}
                ${metric("Verified", verified ? "已完成驗證" : "尚未完成", verified ? "status-ok" : "status-warning")}
                ${metric("Learned", learned ? "已完成學習" : "尚未完成", learned ? "status-ok" : "status-warning")}
                ${metric("來源", sourceText(item.source))}
                ${metric("Trigger", triggerText(item.trigger))}
                ${metric("驗證時間", verified ? formatDateTime(item.verified_at) : "尚未完成")}
                ${metric("學習時間", learned ? formatDateTime(item.learned_at) : "尚未完成")}
              </div>
            </div>
          </div>
        `;
      }).join("");
      document.getElementById("cardHistory").innerHTML = `
        <h2>歷史推薦紀錄</h2>
        <div class="section">
          <p class="mini-title">正式推薦統計</p>
          <div class="grid">
            ${metric("正式推薦總數", fmtNumber(counts.valid_prediction_count || records.length))}
            ${metric("已驗證數", fmtNumber(counts.verified_prediction_count || verifiedCount))}
            ${metric("已學習數", fmtNumber(counts.learning_sample_count || learnedCount))}
            ${metric("等待開獎數", fmtNumber(waitingCount))}
            ${metric("平均命中", `${fmtNumber(history.average_hits || averageHits)} / 20`)}
            ${metric("統計樣本", `${fmtNumber(sampleSize)}期`)}
            ${metric("20碼命中分布", `五星率 ${fmtNumber(history.five_star_rate)}%`)}
            ${metric("Cache 狀態", history.cache ? `${safe(history.cache.status)} / ${fmtNumber(history.cache.ttl_seconds)}秒` : "即時資料")}
          </div>
          ${sampleHint}
        </div>
        <div class="section">
          <p class="mini-title">最近正式推薦</p>
          <div class="rule-list">${recordHtml}</div>
        </div>
      `;
    }

    function renderSync(system, currentDraw, counts, collectorStatus) {
      const lag = Number(system.lag_count || collectorStatus.lag_count || 0);
      const status = lag > 0 || system.is_synced === false ? "warning" : "ok";
      const summary = status === "ok" && lag === 0 ? "已同步" : `落後 ${fmtNumber(lag)} 期`;
      document.getElementById("cardSync").innerHTML = `
        <h2>資料同步</h2>
        <div class="grid">
          ${metric("最新期", safe(system.source_latest_issue || system.latest_issue || currentDraw.issue))}
          ${metric("同步狀態", summary, statusClass(status))}
          ${metric("Database 最新期", safe(system.database_latest_issue))}
          ${metric("Source 最新期", safe(system.source_latest_issue || system.official_latest_issue))}
          ${metric("最後同步時間", safe(system.last_successful_collect_time || collectorStatus.last_collector_finished_at))}
          ${metric("同步耗時", `${fmtNumber(system.last_collect_duration || collectorStatus.last_collector_duration_ms / 1000)} 秒`)}
        </div>
        <h3>最新開獎資訊</h3>
        <div class="grid">
          ${metric("期數", safe(currentDraw.issue))}
          ${metric("開獎時間", safe(currentDraw.draw_time))}
          ${metric("資料來源", safe(currentDraw.source || "official"))}
        </div>
        <h3>一般獎號</h3>${balls(currentDraw.numbers)}
        <h3>超級獎號</h3>${currentDraw.super_number ? balls([currentDraw.super_number], "super") : `<div class="empty">尚無資料</div>`}
      `;
    }

    function renderSync(system, currentDraw, counts, collectorStatus) {
      const lag = Number(system.issues_behind ?? system.lag_count ?? collectorStatus.lag_count ?? 0);
      const syncStatus = system.sync_status || (lag > 0 || system.is_synced === false ? "database_behind" : "synced");
      const status = syncStatus === "synced" ? "ok" : (["analysis_pending", "prediction_pending", "stale"].includes(syncStatus) ? "warning" : "error");
      const officialIssue = system.official_detected_issue || system.source_latest_issue || system.official_latest_issue || system.latest_issue || currentDraw.issue;
      const databaseIssue = system.database_latest_issue;
      const dashboardIssue = system.dashboard_latest_issue || currentDraw.issue;
      const consistent = officialIssue && databaseIssue && dashboardIssue && String(officialIssue) === String(databaseIssue) && String(databaseIssue) === String(dashboardIssue);
      const summary = consistent && status === "ok" ? "同步正常" : (lag ? `落後 ${fmtNumber(lag)} 期` : statusText(syncStatus));
      document.getElementById("cardSync").innerHTML = `
        <h2>資料同步</h2>
        <div class="grid">
          ${metric("官方偵測最新期號", safe(officialIssue))}
          ${metric("資料庫最新期號", safe(databaseIssue))}
          ${metric("Dashboard 顯示期號", safe(dashboardIssue))}
          ${metric("是否一致", consistent ? "一致" : "不一致", consistent ? "status-ok" : "status-warning")}
          ${metric("同步狀態", summary, statusClass(status))}
          ${metric("最後成功抓取時間", safe(system.latest_saved_at || system.last_successful_collect_time || collectorStatus.last_collector_finished_at))}
          ${metric("資料庫是否已保存", system.database_saved ? "已保存" : "未保存", system.database_saved ? "status-ok" : "status-error")}
          ${metric("分析是否完成", system.analysis_created ? "已完成" : "待處理", system.analysis_created ? "status-ok" : "status-warning")}
          ${metric("推薦是否完成", system.prediction_created ? "已完成" : "待處理", system.prediction_created ? "status-ok" : "status-warning")}
          ${metric("Stale 狀態", syncStatus === "stale" ? "stale" : "normal", statusClass(syncStatus === "stale" ? "warning" : "ok"))}
        </div>
        <h3>最新開獎資料</h3>
        <div class="grid">
          ${metric("期號", safe(currentDraw.issue))}
          ${metric("開獎時間", safe(currentDraw.draw_time))}
          ${metric("資料來源", safe(currentDraw.source || "official"))}
          ${metric("號碼數量", fmtNumber(system.numbers_count || normalizeNumbers(currentDraw.numbers).length))}
        </div>
        <h3>號碼</h3>${balls(currentDraw.numbers)}
        <h3>超級獎號</h3>${currentDraw.super_number ? balls([currentDraw.super_number], "super") : `<div class="empty">撠鞈?</div>`}
      `;
    }

    function wakeStatusText(status) {
      if (status === "healthy") return "正常";
      if (status === "delayed") return "可能延遲";
      if (status === "at_risk") return "即將休眠";
      return "尚無資料";
    }

    function wakeStatusClass(status) {
      if (status === "healthy") return "status-ok";
      if (status === "delayed") return "status-warning";
      if (status === "at_risk") return "status-error";
      return "status-unknown";
    }

    function renderWake(wake, latestSync) {
      const status = wake.wake_status || "unknown";
      const seconds = Number(wake.seconds_since_last_health_request);
      const minutes = Number.isFinite(seconds) ? Math.floor(seconds / 60) : null;
      const warning = status === "at_risk"
        ? `<div class="notice bad">外部喚醒可能已失效，Render 免費服務可能因閒置而休眠。</div>`
        : "";
      const restarted = latestSync.latest_saved_at && wake.instance_started_at
        && new Date(wake.instance_started_at).getTime() > new Date(latestSync.latest_saved_at).getTime();
      const restartNotice = restarted
        ? `<div class="notice warn">服務剛重新啟動，休眠期間的排程可能未執行。</div>`
        : "";
      document.getElementById("cardWake").innerHTML = `
        <h2>外部喚醒狀態</h2>
        <div class="grid">
          ${metric("狀態", wakeStatusText(status), wakeStatusClass(status))}
          ${metric("最後 health request", formatDateTime(wake.last_health_request_at))}
          ${metric("距今幾分鐘", minutes === null ? "尚無資料" : `${fmtNumber(minutes)} 分鐘`)}
          ${metric("Wake source", safe(wake.wake_source))}
          ${metric("Instance 啟動時間", formatDateTime(wake.instance_started_at))}
          ${metric("本次啟動 request 數", fmtNumber(wake.health_request_count_since_start))}
        </div>
        ${warning}
        ${restartNotice}
      `;
    }

    function renderContinuity(gaps) {
      const status = gaps.continuity_status || gaps.status || "unknown";
      const missingCount = Number(gaps.missing_count || asList(gaps.missing_issues).length || 0);
      document.getElementById("cardContinuity").innerHTML = `
        <h2>資料連續性檢查</h2>
        <div class="grid">
          ${metric("連續性", statusText(status), statusClass(status === "complete" ? "ok" : status))}
          ${metric("缺漏期數", fmtNumber(missingCount), missingCount ? "status-warning" : "status-ok")}
          ${metric("待驗證", fmtNumber(gaps.pending_verification_count))}
          ${metric("異常資料", fmtNumber(asList(gaps.invalid_issues).length))}
          ${metric("檢查範圍", `${safe(gaps.start_issue)} - ${safe(gaps.end_issue)}`)}
          ${metric("最後檢查", safe(gaps.checked_at))}
        </div>
        <h3>缺漏期數</h3>${chips(asList(gaps.missing_issues).slice(0, 20))}
      `;
    }

    function renderPipeline(health, collectorStatus) {
      const components = Object.entries(health.components || {}).map(([name, item]) =>
        row(name, `${statusText(item.status || "unknown")} / ${fmtNumber(item.duration_ms)}ms`, statusClass(item.status))
      );
      document.getElementById("cardPipeline").innerHTML = `
        <h2>Pipeline 同步狀態</h2>
        <div class="grid">
          ${metric("整體狀態", statusText(health.status || "unknown"), statusClass(health.status))}
          ${metric("Pipeline", statusText(health.pipeline_status || "unknown"), statusClass(health.pipeline_status))}
          ${metric("總耗時", `${fmtNumber(health.total_duration_ms)} ms`)}
          ${metric("Trigger 今日", fmtNumber(health.prediction_trigger_count_today))}
          ${metric("Service Call 今日", fmtNumber(health.prediction_service_call_count_today))}
          ${metric("排程註冊", health.prediction_job_registered ? "已註冊" : "尚未註冊", health.prediction_job_registered ? "status-ok" : "status-warning")}
          ${metric("排程最後狀態", safe(health.prediction_job_last_status))}
          ${metric("排程最後錯誤", safe(health.prediction_job_last_error, "無"))}
          ${metric("等待驗證", fmtNumber(health.live_verification_pending))}
          ${metric("等待學習", fmtNumber(health.live_learning_pending))}
          ${metric("Null Target", fmtNumber(health.null_target_count || health.null_target_today))}
          ${metric("Schedule Coverage", `${fmtNumber(health.schedule_coverage)}%`)}
        </div>
        <h3>Components</h3>${components.length ? rows(components) : `<div class="empty">尚無資料</div>`}
      `;
    }

    function renderOfficial(official) {
      document.getElementById("cardOfficial").innerHTML = `
        <h2>官方驗證中心</h2>
        <div class="grid">
          ${metric("最新官方期數", safe(official.latest_official_issue))}
          ${metric("最新快手期數", safe(official.latest_kuaishou_issue))}
          ${metric("驗證率", `${fmtNumber(official.verified_rate)}%`, Number(official.verified_rate) >= 99 ? "status-ok" : "status-warning")}
          ${metric("已驗證", fmtNumber(official.verified_count))}
          ${metric("Mismatch", fmtNumber(official.mismatch_count), Number(official.mismatch_count) ? "status-error" : "status-ok")}
          ${metric("等待官方", fmtNumber(official.waiting_count || official.waiting_official_count))}
        </div>
      `;
    }

    function renderOperations(ops) {
      const summary = ops.error_summary || {};
      const unresolved = Number(summary.unresolved || 0);
      document.getElementById("cardOperations").innerHTML = `
        <h2>AI Operations Center</h2>
        <div class="grid">
          ${metric("營運狀態", statusText(ops.status || "unknown"), statusClass(ops.status))}
          ${metric("未解決錯誤", fmtNumber(unresolved), unresolved ? "status-error" : "status-ok")}
          ${metric("已解決錯誤", fmtNumber(summary.resolved))}
          ${metric("總錯誤數", fmtNumber(summary.total))}
        </div>
        <h3>最近事件</h3>
        ${rows(asList(ops.timeline).slice(0, 5).map((event) => row(safe(event.component), `${safe(event.status)} / ${safe(event.issue)}`, statusClass(event.status))))}
      `;
    }

    function renderEvolution(evolution, history) {
      const weights = evolution.recommended_weights || evolution.weights || {};
      const weightRows = Object.entries(weights).map(([key, value]) => row(key, percent(value)));
      const versions = asList(history.items || history.history).slice(0, 5).map((item) => row(`V${safe(item.version)}`, `平均 ${fmtNumber(item.average_hits)} / Super ${percent(item.super_hit_rate)}`));
      document.getElementById("cardEvolution").innerHTML = `
        <h2>AI Evolution</h2>
        <div class="grid">
          ${metric("目前版本", safe(evolution.version))}
          ${metric("平均命中", fmtNumber(evolution.average_hits))}
          ${metric("Super Hit", percent(evolution.super_hit_rate))}
          ${metric("Candidate", evolution.candidate ? "YES" : "NO", evolution.candidate ? "status-ok" : "status-unknown")}
        </div>
        <h3>建議權重</h3>${weightRows.length ? rows(weightRows) : `<div class="empty">尚無 Evolution 權重</div>`}
        <h3>Version History</h3>${versions.length ? rows(versions) : `<div class="empty">尚無版本歷史</div>`}
      `;
    }

    document.getElementById("refreshButton").addEventListener("click", loadAll);
    loadAll();
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
