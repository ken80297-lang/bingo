<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bingo AI 智慧預測中心</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111c;
      --panel: #101c28;
      --panel-soft: #162638;
      --text: #f4f8ff;
      --muted: #9fb1c8;
      --line: #284058;
      --ok: #2fd17c;
      --warn: #f6c344;
      --bad: #ff6478;
      --accent: #59c7ff;
      --super: #ffd166;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 0%, rgba(89, 199, 255, .18), transparent 32%),
        radial-gradient(circle at 85% 4%, rgba(47, 209, 124, .10), transparent 30%),
        linear-gradient(180deg, #07111c 0%, #0b1724 100%);
      color: var(--text);
      font-family: Arial, "Microsoft JhengHei", "PingFang TC", sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(780px, 100%);
      margin: 0 auto;
      padding: 18px 12px 42px;
    }

    header {
      padding: 10px 4px 18px;
    }

    h1 {
      margin: 0;
      font-size: 29px;
      line-height: 1.22;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    h3 {
      margin: 16px 0 8px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #1c344a;
      color: var(--text);
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 800;
    }

    .card {
      width: 100%;
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(16, 28, 40, .96);
      box-shadow: 0 16px 36px rgba(0, 0, 0, .24);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .metric .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .metric .value {
      font-size: 20px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .balls, .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      background: #243d55;
      border: 1px solid rgba(255,255,255,.08);
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .ball.super {
      background: var(--super);
      color: #111827;
      box-shadow: 0 0 0 3px rgba(255, 209, 102, .18);
    }

    .ball.hit {
      background: #f6c344;
      color: #111827;
      border-color: rgba(255, 255, 255, .28);
      box-shadow: 0 0 0 3px rgba(246, 195, 68, .18);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #1d3144;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
    }

    .list {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .row span:last-child {
      text-align: right;
      font-weight: 800;
    }

    .empty, .notice {
      padding: 13px;
      border-radius: 10px;
      background: #162433;
      color: var(--muted);
    }

    .notice.warn { color: var(--warn); }
    .notice.bad { color: var(--bad); }
    .notice.ok { color: var(--ok); }

    .status-ok { color: var(--ok); }
    .status-warning { color: var(--warn); }
    .status-error { color: var(--bad); }
    .status-unknown { color: var(--muted); }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: #263849;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--ok), var(--warn), var(--bad));
    }

    .collapse-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      text-align: left;
      cursor: pointer;
    }

    .summary-line {
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .mini-title {
      margin: 0 0 8px;
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
    }

    .rule-list {
      display: grid;
      gap: 10px;
    }

    .rule-item {
      padding: 12px;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .rule-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .muted {
      color: var(--muted);
    }

    details {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: rgba(16, 28, 40, .72);
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 800;
    }

    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: var(--muted);
      font-size: 12px;
    }

    @media (min-width: 720px) {
      main { padding-top: 28px; }
      h1 { font-size: 34px; }
      .card { padding: 22px; }
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      main { padding-left: 10px; padding-right: 10px; padding-bottom: 72px; }
      h1 { font-size: 26px; }
      .card { padding: 14px; border-radius: 10px; }
      .grid { grid-template-columns: 1fr; }
      .ball {
        min-width: 40px;
        height: 36px;
        padding: 0 10px;
        font-size: 16px;
      }
      .metric .value { font-size: 18px; }
      .row { align-items: flex-start; }
      .row span:last-child { max-width: 58%; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Bingo AI 智慧預測中心</h1>
      <div class="subtitle">打開首頁 5 秒內看懂下一期推薦、老玩家模式、資料同步與 AI 成績。</div>
      <div class="toolbar">
        <button type="button" id="refreshButton">重新整理</button>
        <span id="refreshState">載入中</span>
      </div>
    </header>

    <div id="errorBox" class="notice warn" style="display:none"></div>

    <section>
      <article class="card" id="cardNext"></article>
      <article class="card" id="cardLaowanjia"></article>
      <article class="card" id="cardReasons"></article>
      <article class="card" id="cardAlerts"></article>
      <article class="card" id="cardHistory"></article>
      <article class="card" id="cardSync"></article>
      <article class="card" id="cardContinuity"></article>
      <article class="card" id="cardPipeline"></article>
      <article class="card" id="cardOfficial"></article>
      <article class="card" id="cardOperations"></article>
      <article class="card" id="cardEvolution"></article>
    </section>

    <details>
      <summary>進階資訊 / Developer</summary>
      <pre id="developerInfo">載入中</pre>
    </details>
  </main>

  <script>
    const API_TIMEOUT_MS = 10000;
    const HEALTH_STORAGE_KEY = "bingo-ai-health-cache";
    const HEALTH_STORAGE_MAX_AGE_MS = 30 * 60 * 1000;

    const apis = {
      playerSummary: "/api/dashboard/player-summary",
      next: "/api/next-prediction",
      system: "/api/system/status",
      official: "/api/official/statistics",
      health: "/api/system-health",
      operations: "/api/operations/summary",
      evolution: "/api/strategy-evolution/latest",
      evolutionHistory: "/api/strategy-evolution/history",
      collectorStatus: "/api/collector/status",
      collectorGaps: "/api/collector/gaps",
      analysisLatest: "/api/analysis/latest"
    };

    const zhStatus = {
      ok: "正常",
      warning: "警告",
      error: "錯誤",
      unknown: "未知",
      running: "執行中",
      available: "可用",
      ready: "已準備",
      waiting_draw: "等待開獎",
      verified: "已驗證",
      learned: "已學習",
      expired: "已過期",
      failed: "失敗",
      skipped_due_to_lock: "前一輪仍在執行",
      complete: "完整",
      incomplete: "不完整"
    };

    const safe = (value, fallback = "尚無資料") => {
      if (value === null || value === undefined || value === "" || Number.isNaN(value)) return fallback;
      return String(value);
    };

    const asList = (value) => Array.isArray(value) ? value : [];

    const fmtNumber = (value, fallback = "0") => {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return n.toFixed(2).replace(/\.?0+$/, "");
    };

    const percent = (value) => {
      const n = Number(value);
      if (!Number.isFinite(n)) return "0%";
      return `${fmtNumber(n > 1 ? n : n * 100)}%`;
    };

    const statusText = (status) => zhStatus[status] || safe(status);

    const statusClass = (status) => {
      if (["ok", "complete", "ready", "verified", "learned", "available", "running"].includes(status)) return "status-ok";
      if (["warning", "waiting_draw", "skipped_due_to_lock", "incomplete"].includes(status)) return "status-warning";
      if (["error", "expired", "failed"].includes(status)) return "status-error";
      return "status-unknown";
    };

    const zhMap = {
      stable: "穩定",
      high: "高",
      moderate: "普通",
      low: "較低",
      good: "良好",
      excellent: "極佳",
      strong: "優良",
      no_hit: "未命中",
      big: "偏大",
      small: "偏小",
      odd: "偏單",
      even: "偏雙",
      balanced: "均衡",
      Balance: "均衡模型",
      HotCold: "冷熱模型",
      Missing: "缺號模型",
      Pattern: "型態模型",
      laowanjia: "老玩家模型"
    };

    const labelZh = (value) => zhMap[value] || safe(value);

    const normalizeNumbers = (values) => {
      const source = Array.isArray(values) ? values : [];
      return [...new Set(source.map((value) => Number(value)).filter((number) => Number.isInteger(number) && number >= 1 && number <= 80))]
        .sort((a, b) => a - b);
    };

    const sortPairs = (pairs) => asList(pairs)
      .map((pair) => normalizeNumbers(pair).slice(0, 2))
      .filter((pair) => pair.length === 2)
      .sort((a, b) => a[0] - b[0] || a[1] - b[1]);

    const formatDateTime = (value) => safe(value);

    const metric = (label, value, extraClass = "") => `
      <div class="metric">
        <div class="label">${label}</div>
        <div class="value ${extraClass}">${value}</div>
      </div>
    `;

    const balls = (values, type = "", hitValues = []) => {
      const hits = new Set(normalizeNumbers(hitValues));
      const items = normalizeNumbers(values);
      if (!items.length) return `<div class="empty">尚無資料</div>`;
      return `<div class="balls">${items.map((n) => `<span class="ball ${type} ${hits.has(Number(n)) ? "hit" : ""}">${safe(n)}</span>`).join("")}</div>`;
    };

    const chips = (values) => {
      const items = asList(values).filter((item) => item !== null && item !== undefined && item !== "");
      if (!items.length) return `<div class="empty">尚無資料</div>`;
      return `<div class="chips">${items.map((item) => `<span class="chip">${Array.isArray(item) ? item.join(" - ") : safe(item)}</span>`).join("")}</div>`;
    };

    const textList = (values) => {
      const items = asList(values).filter((item) => item !== null && item !== undefined && item !== "");
      if (!items.length) return `<div class="empty">尚無資料</div>`;
      return `<div class="chips">${items.map((item) => `<span class="chip">${safe(item)}</span>`).join("")}</div>`;
    };

    const rows = (items) => `<div class="list">${items.join("")}</div>`;
    const row = (label, value, cls = "") => `<div class="row"><span>${label}</span><span class="${cls}">${value}</span></div>`;

    function saveHealthBrowserCache(payload) {
      try {
        localStorage.setItem(HEALTH_STORAGE_KEY, JSON.stringify({ saved_at: Date.now(), payload }));
      } catch (error) {
        console.warn("[dashboard] health browser cache save failed", error);
      }
    }

    function loadHealthBrowserCache() {
      try {
        const raw = localStorage.getItem(HEALTH_STORAGE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (!cached || !cached.payload) return null;
        if ((Date.now() - Number(cached.saved_at || 0)) > HEALTH_STORAGE_MAX_AGE_MS) return null;
        return {
          ...cached.payload,
          cached: true,
          source: "browser",
          stale: true,
          cache_state: cached.payload.cache_state || "stale",
          browser_cache_saved_at: new Date(cached.saved_at).toISOString()
        };
      } catch (error) {
        console.warn("[dashboard] health browser cache load failed", error);
        return null;
      }
    }

    async function loadJson(key, url, timeoutMs = API_TIMEOUT_MS) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(url, { cache: "no-store", signal: controller.signal });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (key === "health") saveHealthBrowserCache(payload);
        return payload;
      } catch (error) {
        const message = error && error.name === "AbortError"
          ? `${url} timeout after ${timeoutMs / 1000}s`
          : `${url} ${error && error.message ? error.message : error}`;
        console.warn("[dashboard] API failed", { endpoint: url, error: message });
        if (key === "health") {
          const cachedHealth = loadHealthBrowserCache();
          if (cachedHealth) return cachedHealth;
        }
        return { status: "unknown", unavailable: true, error: message };
      } finally {
        clearTimeout(timer);
      }
    }

    async function loadAll() {
      document.getElementById("refreshState").textContent = "載入中";
      const loaded = await Promise.allSettled(
        Object.entries(apis).map(async ([key, url]) => [key, await loadJson(key, url)])
      );
      const data = {};
      const errors = [];
      for (const entry of loaded) {
        if (entry.status === "fulfilled") {
          data[entry.value[0]] = entry.value[1];
          if (entry.value[1] && entry.value[1].unavailable) errors.push(entry.value[1].error);
        } else {
          errors.push(entry.reason && entry.reason.message ? entry.reason.message : String(entry.reason));
        }
      }
      render(data, errors);
      document.getElementById("refreshState").textContent = `最後刷新：${new Date().toLocaleString()}`;
    }

    function normalizeNext(data) {
      const player = data.playerSummary && data.playerSummary.status === "ok" ? data.playerSummary : null;
      const raw = player && player.next_prediction ? player.next_prediction : (data.next && data.next.next_recommendation) || data.next || {};
      return {
        prediction_issue: raw.prediction_issue || raw.target_issue,
        target_issue_source: raw.target_issue_source,
        based_on_issue: raw.based_on_issue || raw.source_issue,
        based_on_draw_time: raw.based_on_draw_time,
        status: raw.status || (raw.prediction_issue || raw.target_issue ? "ready" : "unknown"),
        expected_draw_time: raw.expected_draw_time,
        target_draw_time: raw.target_draw_time || raw.expected_draw_time,
        confidence: raw.confidence,
        candidates: normalizeNumbers(raw.candidates || raw.main_numbers || raw.recommend_numbers || []),
        super_number: raw.super_number || raw.recommended_super_number,
        three_star: normalizeNumbers(raw.three_star || asList(raw.main_numbers).slice(0, 3)),
        four_star: normalizeNumbers(raw.four_star || asList(raw.main_numbers).slice(0, 4)),
        twins: normalizeNumbers(raw.twins || []),
        consecutive: sortPairs(raw.consecutive || []),
        patch_numbers: normalizeNumbers(raw.patch_numbers || []),
        tails: normalizeNumbers(raw.tails || []),
        tail_groups: asList(raw.tail_groups),
        big_small: raw.big_small,
        odd_even: raw.odd_even,
        model_scores: raw.model_scores || {},
        winning_model: raw.winning_model,
        reasons: raw.reasons || [],
        recommendation_warning: raw.recommendation_warning,
        rule_library: raw.rule_library || (player && player.rule_library) || {}
      };
    }

    function render(data, errors) {
      const player = data.playerSummary && data.playerSummary.status === "ok" ? data.playerSummary : null;
      const next = normalizeNext(data);
      const laowanjia = player && player.next_prediction && player.next_prediction.laowanjia
        ? player.next_prediction.laowanjia
        : (data.next && data.next.laowanjia) || {};
      const history = player ? (player.history || {}) : (data.next && data.next.history) || {};
      const alerts = player && player.next_prediction ? (player.next_prediction.alerts || {}) : (data.next && data.next.alerts) || {};
      const previousVerification = player ? (player.previous_verification || {}) : {};
      window.__previousVerification = previousVerification || {};
      const currentDraw = player ? (player.current_draw || {}) : {};
      const counts = player ? (player.data_counts || {}) : {};
      const sync = player ? (player.sync || {}) : (data.system || {});

      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = errors.length ? "block" : "none";
      errorBox.textContent = errors.length ? "部分資料暫時無法取得，其他卡片已先顯示。" : "";

      renderNext(next);
      renderLaowanjia(next.rule_library || (player && player.rule_library) || {}, next);
      renderReasons(next.reasons, data.next || {}, previousVerification, next);
      renderAlerts(alerts, data.analysisLatest || {});
      renderHistory(history, previousVerification, counts);
      renderSync(sync, currentDraw, counts, data.collectorStatus || {});
      renderContinuity(data.collectorGaps || {});
      renderPipeline(data.health || {}, data.collectorStatus || {});
      renderOfficial(data.official || {});
      renderOperations(data.operations || {});
      renderEvolution(data.evolution || {}, data.evolutionHistory || {});
      document.getElementById("developerInfo").textContent = JSON.stringify({
        system: data.system,
        health: data.health,
        collector: data.collectorStatus,
        gaps: data.collectorGaps,
        official: data.official,
        operations_status: data.operations && data.operations.status
      }, null, 2);
    }

    function toggleSection(id, button) {
      const element = document.getElementById(id);
      if (!element) return;
      const expanded = button.getAttribute("aria-expanded") === "true";
      button.setAttribute("aria-expanded", String(!expanded));
      element.hidden = expanded;
      const label = button.querySelector("span:last-child");
      if (label) label.textContent = expanded ? "展開查看" : "收合";
    }

    function renderNext(next) {
      const status = next.status || "unknown";
      const verification = window.__previousVerification || {};
      const verified = verification && verification.verification_status === "verified";
      const hitText = verified
        ? `${fmtNumber(verification.hit_count)} / ${fmtNumber(verification.hit_denominator || verification.prediction_count || 20)}`
        : statusText(verification.verification_status || "waiting_draw");
      const superText = verified
        ? (verification.super_number_predicted ? (verification.super_number_hit ? "命中" : "未命中") : "當期未保存超級獎預測")
        : "尚未驗證";
      document.getElementById("cardNext").innerHTML = `
        <h2>1. 下一期 AI 推薦</h2>
        <div class="grid">
          ${metric("下一期期號", safe(next.prediction_issue))}
          ${metric("預估開獎時間", formatDateTime(next.target_draw_time))}
          ${metric("依據期號", safe(next.based_on_issue))}
          ${metric("依據開獎時間", formatDateTime(next.based_on_draw_time))}
          ${metric("AI 信心值", `${fmtNumber(next.confidence)}%`)}
          ${metric("狀態", statusText(status), statusClass(status))}
          ${metric("最佳模型", labelZh(next.winning_model))}
        </div>
        <h3>AI 推薦 20 碼</h3>
        ${next.recommendation_warning ? `<div class="notice warn">${safe(next.recommendation_warning)}</div>` : ""}
        ${balls(next.candidates)}
        <h3>超級獎號</h3>${next.super_number ? balls([next.super_number], "super") : `<div class="empty">尚無超級獎號推薦</div>`}
        <div class="section">
          <p class="mini-title">三星</p>${balls(next.three_star)}
          <p class="mini-title">四星</p>${balls(next.four_star)}
        </div>
        <div class="section">
          <p class="mini-title">雙生號</p>${balls(next.twins)}
          <p class="mini-title">連號</p>${textList(sortPairs(next.consecutive).map((pair) => `${pair[0]}-${pair[1]}`))}
          <p class="mini-title">補號</p>${balls(next.patch_numbers)}
          <p class="mini-title">尾數</p>${renderTailGroups(next)}
        </div>
        <div class="grid">
          ${metric("大小判斷", labelZh(next.big_small))}
          ${metric("單雙判斷", labelZh(next.odd_even))}
        </div>
        <div class="section">
          <p class="mini-title">AI 摘要</p>
          ${textList([labelZh(next.big_small), labelZh(next.odd_even), next.twins.length ? "雙生模式" : "", next.patch_numbers.length ? "補號模式" : "", next.super_number ? "超級獎模式" : ""].filter(Boolean))}
        </div>
        <div class="section">
          <h3>上一期 AI 驗證</h3>
          <div class="grid">
            ${metric("命中", hitText)}
            ${metric("超級獎", superText, verification.super_number_hit ? "status-ok" : "")}
          </div>
          <div class="summary-line">查看完整驗證結果 → AI 驗證中心</div>
        </div>
        <button class="collapse-button" type="button" aria-expanded="false" onclick="toggleSection('modelVotesBody', this)">
          <span>模型投票</span><span>${Object.keys(next.model_scores || {}).length ? "展開各模型評分" : "尚無資料"}</span>
        </button>
        <div id="modelVotesBody" hidden>${renderModelVotes(next.model_scores)}</div>
      `;
    }

    function renderTailGroups(next) {
      const groups = asList(next.tail_groups).length
        ? asList(next.tail_groups)
        : normalizeNumbers(next.tails).map((tail) => ({ tail, label: `${tail}尾`, numbers: next.candidates.filter((number) => number % 10 === tail) }));
      if (!groups.length) return `<div class="empty">尚無資料</div>`;
      return groups.map((group) => `
        <div class="rule-item">
          <div class="rule-head"><span>${safe(group.label || `${group.tail}尾`)}</span></div>
          ${balls(group.numbers)}
        </div>
      `).join("");
    }

    function renderModelVotes(scores) {
      const entries = Object.entries(scores || {});
      if (!entries.length) return `<div class="empty">尚無模型投票資料</div>`;
      return rows(entries.map(([name, item]) => {
        const confidence = typeof item === "object" ? (item.confidence || item.score || item.total_score) : item;
        const stars = Math.max(1, Math.min(5, Math.round(Number(confidence || 0) / 20)));
        return row(labelZh((item && item.label) || name), `${"★".repeat(stars)}${"☆".repeat(5 - stars)} ${fmtNumber(confidence)}%`);
      }));
    }

    function renderLaowanjia(ruleLibrary, next) {
      const data = ruleLibrary || {};
      const superTrajectory = data.super_trajectory || {};
      const clusterAftershock = data.cluster_recovery || {};
      const rules = asList(data.rules);
      const primary = asList(data.primary_rules);
      const hotZones = asList(data.hot_zones);
      const firstHotZone = hotZones[0];
      const hotZoneLabel = firstHotZone ? `${firstHotZone}～${Number(firstHotZone) + 9}` : "尚無資料";
      document.getElementById("cardLaowanjia").innerHTML = `
        <h2>2. AI 推薦依據</h2>
        <div class="summary-line">已完成 ${fmtNumber(data.completed_count)} 項 Rule Library 分析</div>
        <div class="summary-line">${safe(data.summary)}</div>
        <button class="collapse-button" type="button" aria-expanded="false" onclick="toggleSection('ruleLibraryBody', this)">
          <span>展開完整分析</span><span>展開查看</span>
        </button>
        <div id="ruleLibraryBody" hidden>
          <div class="section">
            <p class="mini-title">本期主要依據</p>${textList(primary)}
          </div>
          <div class="grid">
            ${metric("Rule Library", `${fmtNumber(data.completed_count)} / ${fmtNumber(data.total_count || 19)}`)}
            ${metric("老玩家指數", `${fmtNumber(data.laowanjia_index)} / 100`)}
            ${metric("第一熱區", hotZoneLabel)}
          </div>
          <div class="notice">老玩家指數說明：目前盤勢與歷史老玩家規則的符合程度。</div>
          <div class="section">
            <p class="mini-title">熱區</p>
            <div class="grid">
              ${metric("第一熱區", hotZoneLabel)}
              ${metric("區內重點候選", normalizeNumbers(next.candidates).filter((number) => firstHotZone && number >= Number(firstHotZone) && number <= Number(firstHotZone) + 9).join("、") || "尚無資料")}
            </div>
            ${hotZones.length > 1 ? `<details style="margin-top:10px"><summary>查看更多熱區</summary>${textList(hotZones.slice(1).map((zone) => `${zone}～${Number(zone) + 9}`))}</details>` : ""}
          </div>
          <div class="section">
            <p class="mini-title">可能星數</p>${renderStarPrediction(data.star_prediction)}
          </div>
          <div class="section">
            <p class="mini-title">補號</p>${balls(next.patch_numbers)}
            <p class="mini-title">雙生號</p>${balls(next.twins)}
            <p class="mini-title">連號</p>${textList(sortPairs(next.consecutive).map((pair) => `${pair[0]}-${pair[1]}`))}
            <p class="mini-title">尾數</p>${renderTailGroups(next)}
          </div>
          <div class="section">
            <p class="mini-title">超級獎號軌跡</p>
            <div class="grid">
              ${metric("趨勢", labelZh(superTrajectory.trend) || "此指標尚待校正")}
              ${metric("軌跡信心", superTrajectory.confidence === undefined ? "此指標尚待校正" : `${fmtNumber(superTrajectory.confidence)}%`)}
              ${metric("群聚復原程度", labelZh(clusterAftershock.warning_level || clusterAftershock.status) || "此指標尚待校正")}
            </div>
            <p class="mini-title">超級獎軌跡候選</p>${balls(superTrajectory.candidate_numbers)}
            <p class="mini-title">群聚復原候選</p>${balls(clusterAftershock.candidate_numbers)}
          </div>
          <div class="section">
            <p class="mini-title">正式 Rule Library 19 項</p>
            <div class="rule-list">${rules.map(renderRuleItem).join("")}</div>
          </div>
        </div>
      `;
    }

    function renderStarPrediction(star) {
      const data = star || {};
      const items = [
        ["三星可能性", data.three_star],
        ["四星可能性", data.four_star],
        ["五星可能性", data.five_star],
        ["六星可能性", data.six_star]
      ].map(([label, value]) => row(label, Array.isArray(value) && value.length ? normalizeNumbers(value).join("、") : "尚未建立星數預測"));
      return rows(items);
    }

    function renderRuleItem(rule) {
      const status = rule.status === "ready" ? "已建立" : "資料不足";
      const score = rule.score === null || rule.score === undefined ? "資料不足" : `${fmtNumber(rule.score)}分`;
      return `
        <div class="rule-item">
          <div class="rule-head"><span>${safe(rule.name)}</span><span>${status}</span></div>
          <div class="summary-line">評分 / 信心值：${score}</div>
          <div class="summary-line">本期影響程度：${safe(rule.impact, "資料不足")}</div>
          <div class="summary-line">${safe(rule.reason, "資料不足")}</div>
          <div style="margin-top:8px">${balls(rule.candidate_numbers)}</div>
        </div>
      `;
    }

    function renderReasons(reasons, nextPayload, verification, next) {
      const listItems = asList(reasons).length
        ? asList(reasons).map((reason) => `<li class="row"><span>✓</span><span>${safe(reason)}</span></li>`).join("")
        : `<li class="row"><span>✓</span><span>系統已整合老玩家、冷熱、遺漏、型態與平衡模型。</span></li>`;
      const predictionStatus = verification.prediction_status || next.status || "waiting_draw";
      const learningStatus = verification.learning_used ? "已學習" : "尚未學習";
      document.getElementById("cardReasons").innerHTML = `
        <h2>3. AI 推薦原因</h2>
        <div class="grid">
          ${metric("AI 信心值", `${fmtNumber(nextPayload.confidence || next.confidence)}%`)}
          ${metric("目前狀態摘要", `${statusText(predictionStatus)} / ${learningStatus}`)}
        </div>
        <button class="collapse-button" type="button" aria-expanded="false" onclick="toggleSection('reasonsBody', this)">
          <span>展開查看</span><span>展開查看</span>
        </button>
        <div id="reasonsBody" hidden>
        <div class="grid">
          ${metric("預測狀態", statusText(predictionStatus), statusClass(predictionStatus))}
          ${metric("學習狀態", learningStatus, verification.learning_used ? "status-ok" : "status-warning")}
          ${metric("AI 信心值", `${fmtNumber(nextPayload.confidence || next.confidence)}%`)}
        </div>
        <ul class="list" style="margin-top:12px">${listItems}</ul>
        </div>
      `;
    }

    function alertRow(label, item) {
      const percentValue = Number(item && (item.percent || item.score || item.confidence) || 0);
      const width = Math.max(0, Math.min(100, percentValue));
      const stars = Math.max(0, Math.min(5, Number(item && item.stars) || Math.round(width / 20)));
      return `
        <div class="row" style="display:block">
          <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:7px">
            <span>${label}</span><strong>${"★".repeat(stars)}${"☆".repeat(5 - stars)}</strong>
          </div>
          <div class="bar"><span style="width:${width}%"></span></div>
        </div>
      `;
    }

    function renderAlerts(alerts, analysis) {
      const body = analysis.analysis || analysis.data || analysis || {};
      const aiScore = body.ai_score || {};
      document.getElementById("cardAlerts").innerHTML = `
        <h2>4. 下一期預警</h2>
        ${rows([
          alertRow("大群聚", alerts.cluster_alert || aiScore.cluster_aftershock_recovery),
          alertRow("補號爆發", alerts.patch_alert),
          alertRow("雙生號", alerts.twin_alert),
          alertRow("連號", alerts.consecutive_alert),
          alertRow("超級獎號軌跡", alerts.super_alert || aiScore.super_number_trajectory_recovery)
        ])}
      `;
    }

    function renderHistory(history, verification, counts) {
      if ((!history || history.status === "empty") && !asList(verification && verification.predicted_numbers).length) {
        document.getElementById("cardHistory").innerHTML = `<h2>5. AI 驗證中心</h2><div class="empty">${safe(history && history.message, "尚未累積 AI 預測紀錄，系統已開始保存後續推薦。")}</div>`;
        return;
      }
      const hitCount = Number(verification.hit_count || 0);
      const predictionCount = Number(verification.prediction_count || 0);
      const official = normalizeNumbers(verification.official_numbers || verification.draw_numbers);
      const predicted = normalizeNumbers(verification.predicted_numbers);
      const matched = normalizeNumbers(verification.matched_numbers);
      const missed = normalizeNumbers(verification.missed_numbers);
      const verified = verification && verification.verification_status === "verified" && official.length;
      const denominator = predictionCount || predicted.length || 20;
      const sampleSize = Number(history.sample_size || counts.statistics_sample_count || 0);
      const sampleHint = sampleSize > 0 && sampleSize < 20 ? `<div class="notice warn">樣本數較少，結果僅供參考。</div>` : "";
      const superResult = verified
        ? (verification.super_number_predicted ? (verification.super_number_hit ? "命中" : "未命中") : "當期未保存超級獎預測")
        : "尚未驗證";
      document.getElementById("cardHistory").innerHTML = `
        <h2>5. AI 驗證中心</h2>
        <div class="section">
          <p class="mini-title">上一期驗證結果</p>
          <div class="grid">
            ${metric("比對期數", safe(verification.target_issue || verification.verified_issue))}
            ${metric("開獎時間", safe(verification.draw_time))}
            ${metric("命中", verified ? `${fmtNumber(hitCount)} / ${fmtNumber(denominator)}` : "尚未驗證", hitCount >= 5 ? "status-ok" : hitCount >= 3 ? "status-warning" : "")}
            ${metric("命中等級", labelZh(verification.hit_label))}
            ${metric("官方超級獎號", safe(verification.official_super_number))}
            ${metric("AI 超級獎預測", verification.super_number_predicted ? safe(verification.super_number_predicted) : "當期未保存超級獎預測")}
            ${metric("超級獎結果", superResult, verification.super_number_hit ? "status-ok" : "")}
          </div>
          <h3>AI 推薦 ${fmtNumber(predicted.length)} 碼</h3>${balls(predicted)}
          ${predicted.length && predicted.length !== 20 ? `<div class="notice warn">當期保存 ${fmtNumber(predicted.length)} 個推薦號碼，分母使用實際保存數量。</div>` : ""}
          <h3>官方開獎 20 碼</h3>${verified ? balls(official, "", matched) : `<div class="empty">尚未驗證</div>`}
          <h3>命中號碼</h3>${balls(matched, "hit")}
          <h3>未命中號碼</h3>${balls(missed)}
        </div>
        <div class="section">
          <p class="mini-title">AI 長期成績</p>
        <div class="grid">
          ${metric("三星命中率", `${fmtNumber(history.three_star_rate)}%`)}
          ${metric("四星命中率", `${fmtNumber(history.four_star_rate)}%`)}
          ${metric("五星命中率", `${fmtNumber(history.five_star_rate)}%`)}
          ${metric("超級獎命中率", `${fmtNumber(history.super_hit_rate)}%`)}
          ${metric("平均命中顆數", fmtNumber(history.average_hits))}
          ${metric("AI 預測紀錄", fmtNumber(counts.prediction_count))}
          ${metric("已驗證", fmtNumber(counts.verified_prediction_count))}
          ${metric("統計樣本", `${fmtNumber(sampleSize)}期`)}
          ${metric("學習樣本數", fmtNumber(counts.learning_sample_count))}
        </div>
        ${sampleHint}
        </div>
      `;
    }

    function renderSync(system, currentDraw, counts, collectorStatus) {
      const lag = Number(system.lag_count || collectorStatus.lag_count || 0);
      const status = lag > 0 || system.is_synced === false ? "warning" : "ok";
      const summary = status === "ok" && lag === 0 ? "已同步" : `落後 ${fmtNumber(lag)} 期`;
      document.getElementById("cardSync").innerHTML = `
        <h2>資料同步</h2>
        <div class="grid">
          ${metric("最新期", safe(system.source_latest_issue || system.latest_issue || currentDraw.issue))}
          ${metric("同步狀態", summary, statusClass(status))}
          ${metric("Database 最新期", safe(system.database_latest_issue))}
          ${metric("Source 最新期", safe(system.source_latest_issue || system.official_latest_issue))}
          ${metric("最後同步時間", safe(system.last_successful_collect_time || collectorStatus.last_collector_finished_at))}
          ${metric("同步耗時", `${fmtNumber(system.last_collect_duration || collectorStatus.last_collector_duration_ms / 1000)} 秒`)}
        </div>
        <h3>最新開獎資訊</h3>
        <div class="grid">
          ${metric("期數", safe(currentDraw.issue))}
          ${metric("開獎時間", safe(currentDraw.draw_time))}
          ${metric("資料來源", safe(currentDraw.source || "official"))}
        </div>
        <h3>一般獎號</h3>${balls(currentDraw.numbers)}
        <h3>超級獎號</h3>${currentDraw.super_number ? balls([currentDraw.super_number], "super") : `<div class="empty">尚無資料</div>`}
      `;
    }

    function renderContinuity(gaps) {
      const status = gaps.continuity_status || gaps.status || "unknown";
      const missingCount = Number(gaps.missing_count || asList(gaps.missing_issues).length || 0);
      document.getElementById("cardContinuity").innerHTML = `
        <h2>資料連續性檢查</h2>
        <div class="grid">
          ${metric("連續性", statusText(status), statusClass(status === "complete" ? "ok" : status))}
          ${metric("缺漏期數", fmtNumber(missingCount), missingCount ? "status-warning" : "status-ok")}
          ${metric("待驗證", fmtNumber(gaps.pending_verification_count))}
          ${metric("異常資料", fmtNumber(asList(gaps.invalid_issues).length))}
          ${metric("檢查範圍", `${safe(gaps.start_issue)} - ${safe(gaps.end_issue)}`)}
          ${metric("最後檢查", safe(gaps.checked_at))}
        </div>
        <h3>缺漏期數</h3>${chips(asList(gaps.missing_issues).slice(0, 20))}
      `;
    }

    function renderPipeline(health, collectorStatus) {
      const components = ["collector", "simulation", "recommendation", "prediction", "official_verification", "evolution"];
      const rowsHtml = components.map((name) => {
        const item = health[name] || {};
        return row(name, `${statusText(item.status || "unknown")} / lag ${fmtNumber(item.lag)}`, statusClass(item.status));
      });
      document.getElementById("cardPipeline").innerHTML = `
        <h2>Pipeline 同步狀態</h2>
        <div class="grid">
          ${metric("整體狀態", statusText(health.status || "unknown"), statusClass(health.status))}
          ${metric("快取來源", safe(health.source))}
          ${metric("快取年齡", `${fmtNumber(health.cache_age_seconds)} 秒`)}
          ${metric("Collector Lock", safe(collectorStatus.official_lock_owner || "空閒"))}
          ${metric("跳過次數", fmtNumber(collectorStatus.scheduler_skipped_count))}
          ${metric("連續失敗", fmtNumber(collectorStatus.consecutive_failures))}
        </div>
        <h3>各模組</h3>${rows(rowsHtml)}
      `;
    }

    function renderOfficial(official) {
      document.getElementById("cardOfficial").innerHTML = `
        <h2>官方驗證中心</h2>
        <div class="grid">
          ${metric("最新官方期數", safe(official.latest_official_issue))}
          ${metric("最新快手期數", safe(official.latest_kuaishou_issue))}
          ${metric("驗證率", `${fmtNumber(official.verified_rate)}%`, Number(official.verified_rate) >= 99 ? "status-ok" : "status-warning")}
          ${metric("已驗證", fmtNumber(official.verified_count))}
          ${metric("Mismatch", fmtNumber(official.mismatch_count), Number(official.mismatch_count) ? "status-error" : "status-ok")}
          ${metric("等待官方", fmtNumber(official.waiting_count || official.waiting_official_count))}
        </div>
      `;
    }

    function renderOperations(ops) {
      const summary = ops.error_summary || {};
      const unresolved = Number(summary.unresolved || 0);
      document.getElementById("cardOperations").innerHTML = `
        <h2>AI Operations Center</h2>
        <div class="grid">
          ${metric("營運狀態", statusText(ops.status || "unknown"), statusClass(ops.status))}
          ${metric("未解決錯誤", fmtNumber(unresolved), unresolved ? "status-error" : "status-ok")}
          ${metric("已解決錯誤", fmtNumber(summary.resolved))}
          ${metric("總錯誤數", fmtNumber(summary.total))}
        </div>
        <h3>最近事件</h3>
        ${rows(asList(ops.timeline).slice(0, 5).map((event) => row(safe(event.component), `${safe(event.status)} / ${safe(event.issue)}`, statusClass(event.status))))}
      `;
    }

    function renderEvolution(evolution, history) {
      const weights = evolution.recommended_weights || evolution.weights || {};
      const weightRows = Object.entries(weights).map(([key, value]) => row(key, percent(value)));
      const versions = asList(history.items || history.history).slice(0, 5).map((item) => row(`V${safe(item.version)}`, `平均 ${fmtNumber(item.average_hits)} / Super ${percent(item.super_hit_rate)}`));
      document.getElementById("cardEvolution").innerHTML = `
        <h2>AI Evolution</h2>
        <div class="grid">
          ${metric("目前版本", safe(evolution.version))}
          ${metric("平均命中", fmtNumber(evolution.average_hits))}
          ${metric("Super Hit", percent(evolution.super_hit_rate))}
          ${metric("Candidate", evolution.candidate ? "YES" : "NO", evolution.candidate ? "status-ok" : "status-unknown")}
        </div>
        <h3>建議權重</h3>${weightRows.length ? rows(weightRows) : `<div class="empty">尚無 Evolution 權重</div>`}
        <h3>Version History</h3>${versions.length ? rows(versions) : `<div class="empty">尚無版本歷史</div>`}
      `;
    }

    document.getElementById("refreshButton").addEventListener("click", loadAll);
    loadAll();
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
