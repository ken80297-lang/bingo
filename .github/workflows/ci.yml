name: CI

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bingo-ai-pro/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run backend lint / tests
        run: python -m pytest -q

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bingo-ai-pro/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
